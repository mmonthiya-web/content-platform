<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --oyster:#F1ECE1;--pure:#F8F5F0;--linen:#EDE8DF;
  --khaki:#C3B091;--taupe:#9A8C7E;--mocha:#5C4A3A;--ink:#2E1F14;
  --caramel:#864C24;--autumn:#643C20;--caramel-l:#E8D5C0;--caramel-ll:#F5EDE3;
  --sage:#5A7048;--sage-bg:#E6EEE0;--sage-dk:#3E5432;
  --amber:#7A5518;--amber-bg:#F2E8D0;
  --white:#FFFFFF;
  --border:rgba(163,140,115,.2);--border2:rgba(163,140,115,.11);
  --r-sm:4px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --sb:200px;--top:52px;--mob-top:52px;--mob-bottom:60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{font-family:'Poppins',sans-serif;background:var(--oyster);color:var(--ink);height:100vh;overflow:hidden;display:flex;}

/* ══ SIDEBAR (desktop) ══ */
.sb{width:var(--sb);flex-shrink:0;background:var(--pure);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sb-logo{font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink);}
.sb-logo em{font-style:italic;color:var(--caramel);}
.sb-tag{font-size:10px;color:var(--taupe);margin-top:1px;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;}
.sb-nav::-webkit-scrollbar{width:0;}
.sbg{margin-bottom:2px;}
.sbg-lbl{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--khaki);padding:10px 16px 4px;display:flex;align-items:center;gap:6px;}
.sbg-lbl::after{content:'';flex:1;height:1px;background:var(--border2);}
.ni{display:flex;align-items:center;gap:9px;padding:7px 14px 7px 16px;font-size:12px;color:var(--taupe);cursor:pointer;border-left:2px solid transparent;transition:all .12s;}
.ni:hover{color:var(--mocha);background:var(--linen);}
.ni.on{color:var(--caramel);background:var(--caramel-ll);border-left-color:var(--caramel);font-weight:600;}
.ni i{font-size:15px;flex-shrink:0;}
.nb{margin-left:auto;font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--linen);color:var(--taupe);}
.ni.on .nb{background:var(--caramel-l);color:var(--autumn);}
.n-new{margin-left:auto;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;background:#F0E5D8;color:var(--caramel);}
.sb-foot{padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.sb-cta{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-md);background:var(--caramel);color:var(--oyster);font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:background .12s;}
.sb-cta:hover{background:var(--autumn);}
.sb-cta i{font-size:14px;}
.sb-ghost{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--r-md);background:transparent;color:var(--taupe);font-family:'Poppins',sans-serif;font-size:11.5px;cursor:pointer;border:1px solid var(--border);transition:all .12s;}
.sb-ghost:hover{color:var(--mocha);background:var(--linen);}
.sb-ghost i{font-size:14px;}

/* ══ MAIN ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* TOPBAR */
.topbar{height:var(--top);flex-shrink:0;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;}
.crumb{display:flex;align-items:center;gap:6px;font-size:13px;}
.crumb .r{color:var(--taupe);cursor:pointer;transition:color .12s;}
.crumb .r:hover{color:var(--caramel);}
.crumb .sep{color:var(--khaki);font-size:11px;}
.crumb .cur{font-weight:600;color:var(--ink);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:7px;}
.sbox{position:relative;display:flex;align-items:center;}
.sbox i{position:absolute;left:9px;font-size:14px;color:var(--taupe);pointer-events:none;}
.sinp{height:32px;width:190px;padding:0 10px 0 30px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--oyster);font-family:'Poppins',sans-serif;font-size:12px;color:var(--ink);outline:none;transition:all .12s;}
.sinp:focus{border-color:var(--caramel);background:var(--white);}
.sinp::placeholder{color:var(--khaki);}
/* search result count */
.s-count{font-size:11px;color:var(--taupe);white-space:nowrap;display:none;}
.s-count.vis{display:block;}
.tbtn{height:32px;padding:0 12px;border-radius:var(--r-md);border:none;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;}
.tbtn.g{background:var(--oyster);color:var(--mocha);border:1px solid var(--border);}
.tbtn.g:hover{background:var(--linen);}
.tbtn.p{background:var(--caramel);color:var(--oyster);}
.tbtn.p:hover{background:var(--autumn);}
.tbtn i{font-size:14px;}
.tb-av{width:30px;height:30px;border-radius:50%;background:var(--caramel-l);color:var(--autumn);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid var(--border);flex-shrink:0;}

/* ══ VIEWS ══ */
.view{display:none;flex:1;overflow:hidden;flex-direction:column;}
.view.active{display:flex;}

/* ════════════════════
   VIEW A — LIBRARY
════════════════════ */
/* type filter — horizontal scroll chips (replaces tab+sidebar duplication) */
.type-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:0;flex-shrink:0;overflow:hidden;}
.type-chips{display:flex;gap:5px;padding:9px 0;overflow-x:auto;flex:1;}
.type-chips::-webkit-scrollbar{height:0;}
.tchip{height:28px;padding:0 12px;border-radius:20px;font-family:'Poppins',sans-serif;font-size:11.5px;font-weight:500;color:var(--taupe);background:transparent;border:1px solid var(--border);cursor:pointer;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.tchip:hover{background:var(--linen);color:var(--mocha);}
.tchip.on{background:var(--ink);color:var(--oyster);border-color:var(--ink);}
.tchip .tc{font-size:10px;font-weight:700;padding:1px 5px;border-radius:20px;}
.tchip.on .tc{background:rgba(255,255,255,.2);color:rgba(255,255,255,.85);}
.tchip:not(.on) .tc{background:var(--linen);color:var(--taupe);}
/* breakdown chip special */
.tchip.bd-chip{border-left:3px solid #2A5080;}
.tchip.bd-chip.on{background:#2A5080;border-color:#2A5080;}
.type-divider{width:1px;height:20px;background:var(--border);margin:0 8px;flex-shrink:0;}
/* status filter */
.status-chips{display:flex;gap:5px;padding:9px 0;overflow-x:auto;flex-shrink:0;}
.status-chips::-webkit-scrollbar{height:0;}
.schip{height:26px;padding:0 10px;border-radius:20px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;color:var(--taupe);background:transparent;border:1px solid var(--border);cursor:pointer;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.schip:hover{background:var(--linen);color:var(--mocha);}
.schip.on{background:var(--caramel-ll);color:var(--caramel);border-color:var(--caramel-l);}
.schip .dot{width:6px;height:6px;border-radius:50%;}
/* view/sort controls */
.bar-r{margin-left:auto;display:flex;align-items:center;gap:6px;padding-left:10px;flex-shrink:0;}
.vtog{display:flex;gap:2px;background:var(--linen);border-radius:var(--r-sm);padding:2px;}
.vbtn{width:26px;height:26px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--taupe);transition:all .12s;}
.vbtn.on{background:var(--white);color:var(--ink);}
.vbtn i{font-size:15px;}
.ssel{height:28px;padding:0 8px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--oyster);font-family:'Poppins',sans-serif;font-size:11px;color:var(--mocha);outline:none;cursor:pointer;}

/* body split */
.lib-body{flex:1;display:grid;grid-template-columns:1fr 320px;overflow:hidden;}

/* CARD AREA */
.card-area{overflow-y:auto;padding:14px 12px 28px 20px;}
.card-area::-webkit-scrollbar{width:4px;}
.card-area::-webkit-scrollbar-thumb{background:var(--khaki);border-radius:999px;}
.card-area.gv .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px;}
.card-area.lv .cards{display:flex;flex-direction:column;gap:5px;}

/* search state banner */
.search-banner{display:none;padding:8px 12px;background:var(--caramel-ll);border-radius:var(--r-md);margin-bottom:10px;font-size:12px;color:var(--mocha);display:none;align-items:center;gap:8px;}
.search-banner.vis{display:flex;}
.search-banner strong{color:var(--caramel);}
.sb-clear{margin-left:auto;font-size:11px;color:var(--caramel);cursor:pointer;font-weight:600;}
.sb-clear:hover{color:var(--autumn);}

/* CARD */
.mcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 13px;cursor:pointer;transition:all .13s;display:flex;flex-direction:column;gap:7px;position:relative;}
.mcard:hover{border-color:var(--caramel-l);box-shadow:0 2px 10px rgba(134,76,36,.06);}
.mcard.sel{border-color:var(--caramel);background:var(--caramel-ll);}
.mcard.bd-card{border-left:3px solid #3A6090;}
.mcard.bd-card:hover{border-left-color:#2A5080;}
.mcard-top{display:flex;align-items:center;justify-content:space-between;}
.mtag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.mdate{font-size:10px;color:var(--taupe);}
.mtitle{font-size:12.5px;font-weight:500;color:var(--ink);line-height:1.45;}
.mbody{font-size:11.5px;color:var(--taupe);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mtrail{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.tt{font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:20px;}
.tt-e{background:#F0EDE8;color:var(--mocha);}
.tt-f{background:var(--sage-bg);color:var(--sage-dk);}
.tt-a{background:var(--caramel-ll);color:var(--caramel);}
.tsep{font-size:10px;color:var(--khaki);}
.mfoot{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid var(--border2);}
.utag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
.u-un{background:var(--linen);color:var(--taupe);}
.u-dr{background:var(--caramel-ll);color:var(--caramel);}
.u-pb{background:var(--sage-bg);color:var(--sage-dk);}
/* always-visible action buttons */
.mcard-btns{display:flex;gap:5px;}
.mbtn{height:26px;padding:0 10px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Poppins',sans-serif;font-size:10.5px;font-weight:500;color:var(--mocha);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.mbtn i{font-size:12px;}
.mbtn.primary{background:var(--caramel);color:var(--oyster);border-color:var(--caramel);}
.mbtn.primary:hover{background:var(--autumn);}
.mbtn:not(.primary):hover{background:var(--linen);}
/* breakdown card extra */
.bd-arrow{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#3A6090;margin-top:2px;}
.bd-arrow i{font-size:13px;}
.bd-extracted-row{display:flex;gap:5px;flex-wrap:wrap;}
.bd-et{font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:20px;}

/* LIST ROW */
.mrow{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 13px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:10px;}
.mrow:hover{border-color:var(--caramel-l);background:var(--caramel-ll);}
.mrow.sel{border-color:var(--caramel);background:var(--caramel-ll);}
.mrow-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.mrow-title{flex:1;font-size:12.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mrow-trail{display:flex;gap:3px;flex-shrink:0;}
.mrow-u{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.mrow-date{font-size:10.5px;color:var(--taupe);flex-shrink:0;min-width:46px;text-align:right;}
/* always-visible row action */
.mrow-act{height:26px;padding:0 10px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Poppins',sans-serif;font-size:10.5px;font-weight:600;color:var(--caramel);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px;flex-shrink:0;white-space:nowrap;}
.mrow-act:hover{background:var(--caramel);color:var(--oyster);border-color:var(--caramel);}
.mrow-act i{font-size:12px;}

/* tag colors */
.tag-inspire{background:#F5E4D5;color:var(--caramel);}
.tag-hook{background:#ECE8F5;color:#5340A0;}
.tag-title{background:var(--sage-bg);color:var(--sage-dk);}
.tag-cta{background:var(--amber-bg);color:var(--amber);}
.tag-breakdown{background:#E8EEF5;color:#2A5080;}
.tag-faq{background:var(--linen);color:var(--mocha);}

/* empty state */
.empty-state{padding:48px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
.es-ic{width:48px;height:48px;border-radius:var(--r-lg);background:var(--linen);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--taupe);}
.es-title{font-size:14px;font-weight:600;color:var(--ink);}
.es-sub{font-size:12px;color:var(--taupe);line-height:1.6;max-width:240px;}
.es-btn{margin-top:4px;height:36px;padding:0 18px;border-radius:var(--r-md);border:none;background:var(--caramel);color:var(--oyster);font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.es-btn i{font-size:14px;}

/* ══ DETAIL PANEL (right, desktop) ══ */
.dp{background:var(--pure);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.dp-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--taupe);padding:24px;text-align:center;}
.dp-empty i{font-size:30px;opacity:.3;}
.dp-empty p{font-size:12px;line-height:1.6;max-width:150px;}
.dp-head{padding:14px 16px 11px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dp-tag-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.dp-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
.dp-close{width:24px;height:24px;border-radius:var(--r-sm);border:none;background:var(--linen);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--taupe);transition:all .12s;}
.dp-close:hover{background:var(--border);color:var(--ink);}
.dp-close i{font-size:14px;}
.dp-title{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.45;margin-bottom:7px;}
.dp-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.dp-mi{font-size:10.5px;color:var(--taupe);display:flex;align-items:center;gap:3px;}
.dp-mi i{font-size:12px;}
.dp-body{flex:1;overflow-y:auto;padding:13px 16px;}
.dp-body::-webkit-scrollbar{width:0;}
.dp-sl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.dp-sl::after{content:'';flex:1;height:1px;background:var(--border2);}
.dp-sec{margin-bottom:14px;}
.dp-txt{font-size:12.5px;color:var(--mocha);line-height:1.75;background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;}
.dp-chain{display:flex;flex-direction:column;gap:4px;}
.dp-crow{display:flex;align-items:center;gap:6px;padding:6px 9px;background:var(--white);border:1px solid var(--border2);border-radius:var(--r-md);font-size:11.5px;color:var(--mocha);}
.dp-crow i{font-size:13px;color:var(--taupe);}
.dp-ctag{font-size:10px;font-weight:600;padding:1px 5px;border-radius:20px;}
.dp-rl{display:flex;flex-direction:column;gap:4px;}
.dp-ri{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--white);border:1px solid var(--border2);border-radius:var(--r-md);cursor:pointer;transition:all .12s;}
.dp-ri:hover{background:var(--caramel-ll);border-color:var(--caramel-l);}
.dp-rt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.dp-rn{flex:1;font-size:11.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* CTA footer — use this item */
.dp-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.dp-use-btn{width:100%;height:36px;border-radius:var(--r-md);border:none;background:var(--caramel);color:var(--oyster);font-family:'Poppins',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .12s;}
.dp-use-btn:hover{background:var(--autumn);}
.dp-use-btn i{font-size:15px;}
.dp-use-hint{font-size:10.5px;color:var(--taupe);text-align:center;line-height:1.5;}
.dp-sec-btns{display:flex;gap:6px;}
.dp-sec-btn{flex:1;height:30px;border-radius:var(--r-md);border:1px solid var(--border);background:transparent;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;color:var(--mocha);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s;}
.dp-sec-btn:hover{background:var(--linen);}
.dp-sec-btn i{font-size:13px;}

/* ════════════════════
   VIEW B — BREAKDOWN DETAIL
════════════════════ */
.bd-view{flex:1;display:none;overflow:hidden;}
.bd-view.active{display:grid;grid-template-columns:268px 1fr;}
.bdl{background:var(--pure);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.bdl-head{padding:12px 14px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
.bdl-title{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:7px;}
.bdl-si{position:relative;}
.bdl-si i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--taupe);}
.bdl-sinp{width:100%;height:30px;padding:0 10px 0 30px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--oyster);font-family:'Poppins',sans-serif;font-size:11.5px;color:var(--ink);outline:none;}
.bdl-sinp:focus{border-color:var(--caramel);}
.bdl-sinp::placeholder{color:var(--khaki);}
.bdl-list{flex:1;overflow-y:auto;padding:6px;}
.bdl-list::-webkit-scrollbar{width:0;}
.bdl-item{padding:9px 11px;border-radius:var(--r-md);cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:3px;}
.bdl-item:hover{background:var(--linen);}
.bdl-item.on{background:var(--caramel-ll);border-color:var(--caramel-l);}
.bdl-num{font-size:9.5px;font-weight:700;color:var(--taupe);margin-bottom:2px;}
.bdl-item.on .bdl-num{color:var(--caramel);}
.bdl-name{font-size:12px;font-weight:500;color:var(--ink);line-height:1.4;margin-bottom:4px;}
.bdl-tags{display:flex;gap:3px;flex-wrap:wrap;}
.bdl-tag{font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:20px;}
.bdl-meta{font-size:10px;color:var(--taupe);margin-top:3px;}
.bdd{flex:1;overflow-y:auto;}
.bdd::-webkit-scrollbar{width:4px;}
.bdd::-webkit-scrollbar-thumb{background:var(--khaki);border-radius:999px;}
.bdd-inner{max-width:760px;padding:20px 24px 48px;}
/* bd header */
.bh-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#E8EEF5;color:#2A5080;margin-bottom:8px;}
.bh-badge i{font-size:12px;}
.bh-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
.bh-title{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;color:var(--ink);line-height:1.3;}
.bh-title em{font-style:italic;color:var(--caramel);}
.bh-acts{display:flex;gap:5px;flex-shrink:0;}
.bha{height:30px;padding:0 12px;border-radius:var(--r-md);border:none;font-family:'Poppins',sans-serif;font-size:11.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;}
.bha.p{background:var(--caramel);color:var(--oyster);}
.bha.p:hover{background:var(--autumn);}
.bha.g{background:var(--white);color:var(--mocha);border:1px solid var(--border);}
.bha.g:hover{background:var(--linen);}
.bha i{font-size:13px;}
.bh-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.bh-mi{font-size:11px;color:var(--taupe);display:flex;align-items:center;gap:4px;}
.bh-mi i{font-size:13px;}
.bh-url{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:var(--caramel-ll);border:1px solid var(--caramel-l);border-radius:var(--r-md);font-size:11px;color:var(--caramel);cursor:pointer;margin-top:8px;max-width:100%;overflow:hidden;}
.bh-url i{font-size:13px;flex-shrink:0;}
.bh-url span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* sections */
.bs{margin-bottom:16px;}
.bs-lbl{font-size:9.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--taupe);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.bs-lbl::after{content:'';flex:1;height:1px;background:var(--border2);}
.b-summary{font-size:13px;color:var(--mocha);line-height:1.8;background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.kv{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;}
.kv.full{grid-column:1/-1;}
.kv-l{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--taupe);margin-bottom:4px;}
.kv-v{font-size:12.5px;color:var(--ink);line-height:1.6;}
.kv-v.lg{font-size:13.5px;font-weight:600;color:var(--caramel);}
.kv-v.mono{font-size:11.5px;color:var(--mocha);background:var(--oyster);border-radius:var(--r-sm);padding:7px 9px;line-height:1.7;font-family:monospace;}
.kw-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.kw{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--linen);color:var(--mocha);}
.etag{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:#FDE8D8;color:var(--caramel);}
.ftag{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--sage-bg);color:var(--sage-dk);}
/* next step CTA — after reading breakdown */
.next-step{background:var(--caramel-ll);border:1px solid var(--caramel-l);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:16px;}
.ns-title{font-size:12px;font-weight:600;color:var(--caramel);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.ns-title i{font-size:14px;}
.ns-items{display:flex;flex-direction:column;gap:5px;}
.ns-item{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--white);border-radius:var(--r-md);cursor:pointer;border:1px solid var(--caramel-l);transition:all .12s;}
.ns-item:hover{background:var(--caramel-ll);border-color:var(--caramel);}
.ns-dot{width:8px;height:8px;border-radius:50%;background:var(--caramel);flex-shrink:0;}
.ns-dot.done{background:var(--sage);}
.ns-text{flex:1;font-size:12px;color:var(--ink);}
.ns-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--caramel-ll);color:var(--caramel);flex-shrink:0;}
.ns-tag.done{background:var(--sage-bg);color:var(--sage-dk);}
/* assets */
.ag{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.ac{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;cursor:pointer;transition:all .12s;}
.ac:hover{border-color:var(--caramel-l);background:var(--caramel-ll);}
.ac.add{border-style:dashed;background:transparent;}
.ac.add:hover{background:var(--linen);}
.ac-type{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:20px;display:inline-block;margin-bottom:5px;}
.ac-text{font-size:12px;color:var(--ink);line-height:1.5;}
.ac.add .ac-text{color:var(--taupe);}
.ac-st{font-size:10px;color:var(--taupe);margin-top:4px;display:flex;align-items:center;gap:3px;}
.ac-st i{font-size:12px;}
/* tips */
.tip-list{display:flex;flex-direction:column;gap:5px;}
.tip{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);}
.tip-ic{width:22px;height:22px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;}
.tip-text{font-size:12px;color:var(--mocha);line-height:1.65;}
.xtags{display:flex;flex-wrap:wrap;gap:5px;}
.xtag{font-size:11.5px;padding:4px 12px;border-radius:20px;background:var(--linen);color:var(--mocha);border:1px solid var(--border);}

/* ════════════════════
   MOBILE BOTTOM NAV
════════════════════ */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mob-bottom);background:var(--white);border-top:1px solid var(--border);z-index:100;display:none;align-items:stretch;}
.mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--taupe);transition:all .12s;border:none;background:transparent;font-family:'Poppins',sans-serif;}
.mob-nav-item.on{color:var(--caramel);}
.mob-nav-item i{font-size:20px;}
.mob-nav-item span{font-size:9.5px;font-weight:500;}

/* ════════════════════
   MOBILE DETAIL SHEET
════════════════════ */
.mob-sheet{display:none;position:fixed;inset:0;z-index:200;flex-direction:column;}
.mob-sheet.open{display:flex;}
.mob-sheet-overlay{position:absolute;inset:0;background:rgba(46,31,20,.4);}
.mob-sheet-card{position:absolute;bottom:0;left:0;right:0;background:var(--white);border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.mob-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0;flex-shrink:0;}
.mob-sheet-head{padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mob-sheet-head .dp-tag-row{margin-bottom:6px;}
.mob-sheet-body{flex:1;overflow-y:auto;padding:12px 16px 8px;}
.mob-sheet-foot{padding:10px 16px 20px;border-top:1px solid var(--border);flex-shrink:0;}

/* ════════════════════
   RESPONSIVE
════════════════════ */
@media(max-width:768px){
  body{flex-direction:column;}
  .sb{display:none;}
  .main{height:100vh;padding-bottom:var(--mob-bottom);}
  .topbar{padding:0 14px;}
  .sinp{width:150px;}
  .s-count{display:none!important;}
  .tbtn.g{display:none;}
  .tb-r #tbr-bd .tbtn.g{display:flex;}
  .type-bar{padding:0 12px;}
  .bar-r .vtog{display:none;}
  .bar-r .ssel{display:none;}
  /* library body: full width, no detail panel */
  .lib-body{grid-template-columns:1fr;}
  .dp{display:none;}
  .card-area{padding:10px 12px 20px;}
  /* bd view: full width, no list panel */
  .bd-view.active{grid-template-columns:1fr;}
  .bdl{display:none;}
  .mob-nav{display:flex;}
  /* cards slightly wider on mobile */
  .card-area.gv .cards{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
  .mcard{padding:10px 11px;}
  .mtitle{font-size:12px;}
  .mcard-btns .mbtn:not(.primary){display:none;}
}

@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mob-sheet-card{animation:slideUp .22s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.view.active,.bd-view.active{animation:fadeUp .25s ease both;}
*{scrollbar-width:thin;scrollbar-color:var(--khaki) transparent;}
</style>

/* ─── RENDER ─── */
function renderCards(){
  const q=document.getElementById('search-inp').value.toLowerCase().trim();
  const sort=document.querySelector('.ssel').value;
  let items=ITEMS.filter(d=>{
    return (curType==='all'||d.type===curType)
      &&(curStatus==='all'||d.status===curStatus)
      &&(!q||d.title.toLowerCase().includes(q)||d.body.toLowerCase().includes(q));
  });
  if(sort==='oldest') items=items.slice().reverse();
  else if(sort==='alpha') items=items.slice().sort((a,b)=>a.title.localeCompare(b.title,'zh'));

  // search banner
  const banner=document.getElementById('search-banner');
  if(q){
    banner.classList.add('vis');
    document.getElementById('search-count-txt').textContent=items.length;
    document.getElementById('search-kw-txt').textContent=q;
  } else banner.classList.remove('vis');

  // search count in topbar
  const sc=document.getElementById('s-count');
  if(q){sc.textContent=`找到 ${items.length} 条`;sc.classList.add('vis');}
  else sc.classList.remove('vis');

  const con=document.getElementById('cards');
  con.innerHTML='';
  if(!items.length){
    const isEmpty=!ITEMS.length;
    con.innerHTML=isEmpty
      ?`<div class="empty-state"><div class="es-ic"><i class="ti ti-inbox"></i></div><div class="es-title">素材库还是空的</div><div class="es-sub">先导入一篇爆款分析结果，系统会自动提取 Hook、标题、CTA 等素材入库</div><button class="es-btn"><i class="ti ti-download"></i>导入分析结果</button></div>`
      :`<div class="empty-state"><div class="es-ic"><i class="ti ti-search-off"></i></div><div class="es-title">没有找到匹配的素材</div><div class="es-sub">试试调整筛选条件，或者换个关键词搜索</div></div>`;
    return;
  }
  if(curView==='grid') items.forEach(d=>con.appendChild(makeCard(d)));
  else items.forEach(d=>con.appendChild(makeRow(d)));
}

function makeCard(d){
  const m=TYPE_META[d.type];const sm=STATUS_META[d.status];
  const el=document.createElement('div');
  el.className='mcard'+(selId===d.id?' sel':'');
  el.onclick=()=>openDetail(d.id);
  const trail=d.source.map(s=>{const c=s.startsWith('爆款')?'tt-e':s.startsWith('高频')?'tt-f':'tt-a';return`<span class="tt ${c}">${s}</span>`;}).join('<span class="tsep">·</span>');
  el.innerHTML=`
    <div class="mcard-top"><span class="mtag ${m.cls}">${m.label}</span><span class="mdate">${d.date}</span></div>
    <div class="mtitle">${d.title}</div>
    <div class="mbody">${d.body}</div>
    ${d.source.length?`<div class="mtrail">${trail}</div>`:''}
    <div class="mfoot">
      <span class="utag ${sm.cls}">${sm.label}</span>
      <div class="mcard-btns">
        <button class="mbtn primary" onclick="event.stopPropagation()"><i class="ti ti-writing"></i>用于创作</button>
        <button class="mbtn" onclick="event.stopPropagation()"><i class="ti ti-copy"></i></button>
      </div>
    </div>`;
  return el;
}

function makeRow(d){
  const m=TYPE_META[d.type];const sm=STATUS_META[d.status];
  const el=document.createElement('div');
  el.className='mrow'+(selId===d.id?' sel':'');
  el.onclick=()=>openDetail(d.id);
  const trail=d.source.slice(0,2).map(s=>{const c=s.startsWith('爆款')?'tt-e':s.startsWith('高频')?'tt-f':'tt-a';return`<span class="tt ${c}">${s}</span>`;}).join('');
  el.innerHTML=`
    <span class="mrow-tag ${m.cls}">${m.label}</span>
    <span class="mrow-title">${d.title}</span>
    <div class="mrow-trail">${trail}</div>
    <span class="mrow-u utag ${sm.cls}">${sm.label}</span>
    <span class="mrow-date">${d.date}</span>
    <button class="mrow-act" onclick="event.stopPropagation()"><i class="ti ti-writing"></i>用于创作</button>`;
  return el;
}

/* ─── DETAIL ─── */
function buildDetailHTML(d){
  const m=TYPE_META[d.type];const sm=STATUS_META[d.status];
  return {
    tag:{cls:`dp-tag ${m.cls}`,text:m.label},
    title:d.title,
    meta:`<span class="dp-mi"><i class="ti ti-calendar"></i>${d.date}</span><span class="dp-mi utag ${sm.cls}">${sm.label}</span>`,
    txt:d.body,
    chain:d.source.length?d.source.map(s=>{
      const c=s.startsWith('爆款')?'tt-e':s.startsWith('高频')?'tt-f':'tt-a';
      const ic=s.startsWith('爆款')?'ti-microscope':s.startsWith('高频')?'ti-message-dots':'ti-sparkles';
      return`<div class="dp-crow"><i class="ti ${ic}"></i><span class="dp-ctag ${c}">${s}</span><span style="font-size:11px;color:var(--taupe)">→ 触发此素材生成</span></div>`;
    }).join(''):'',
    related:d.related&&d.related.length?d.related.map(r=>{
      const rm=TYPE_META[r.type]||{label:r.type,cls:'tag-inspire'};
      return`<div class="dp-ri"><span class="dp-rt ${rm.cls}">${rm.label}</span><span class="dp-rn">${r.title}</span><i class="ti ti-arrow-right" style="font-size:12px;color:var(--taupe)"></i></div>`;
    }).join(''):'',
  };
}

function openDetail(id){
  selId=id;
  const d=ITEMS.find(x=>x.id===id);
  const h=buildDetailHTML(d);
  const isMob=window.innerWidth<=768;
  if(isMob){
    // mobile sheet
    const sheet=document.getElementById('mob-sheet');
    const tag=document.getElementById('mob-dp-tag');
    tag.className=h.tag.cls;tag.textContent=h.tag.text;
    document.getElementById('mob-dp-title').textContent=h.title;
    document.getElementById('mob-dp-meta').innerHTML=h.meta;
    document.getElementById('mob-dp-txt').textContent=d.body;
    const ms=document.getElementById('mob-src-sec');
    const mc=document.getElementById('mob-dp-chain');
    if(h.chain){ms.style.display='';mc.innerHTML=h.chain;}else ms.style.display='none';
    const mr=document.getElementById('mob-rel-sec');
    const mrl=document.getElementById('mob-dp-rel');
    if(h.related){mr.style.display='';mrl.innerHTML=h.related;}else mr.style.display='none';
    sheet.classList.add('open');
  } else {
    // desktop panel
    document.getElementById('dp-empty').style.display='none';
    const dc=document.getElementById('dp-content');dc.style.display='flex';
    const tag=document.getElementById('dp-tag');tag.className=h.tag.cls;tag.textContent=h.tag.text;
    document.getElementById('dp-title').textContent=h.title;
    document.getElementById('dp-meta').innerHTML=h.meta;
    document.getElementById('dp-txt').textContent=d.body;
    const ss=document.getElementById('dp-src-sec');const ch=document.getElementById('dp-chain');
    if(h.chain){ss.style.display='';ch.innerHTML=h.chain;}else ss.style.display='none';
    const rs=document.getElementById('dp-rel-sec');const rl=document.getElementById('dp-rel');
    if(h.related){rs.style.display='';rl.innerHTML=h.related;}else rs.style.display='none';
  }
  renderCards();
}
